name: Deploy Live API Proxy

on:
  push:
    branches: [main]
    paths:
      - 'workers/livewweb-proxy/**'
      - '.github/workflows/deploy-livewweb-proxy.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: livewweb-proxy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    defaults:
      run:
        working-directory: workers/livewweb-proxy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install wrangler
        run: npm install --no-audit --no-fund

      - name: Verify Cloudflare secrets
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] || [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "::warning::CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID not set — skipping worker deploy"
            exit 0
          fi

      - name: Deploy Cloudflare Worker
        id: deploy
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          npx wrangler deploy 2>&1 | tee /tmp/wrangler.log
          url=$(grep -oE 'https://livewweb-proxy\.[a-z0-9-]+\.workers\.dev' /tmp/wrangler.log | head -1 || true)
          if [ -z "$url" ]; then
            url="https://livewweb-proxy.${CLOUDFLARE_ACCOUNT_ID}.workers.dev"
          fi
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Proxy URL: $url"

      - name: Health check deployed proxy
        if: steps.deploy.outcome == 'success'
        run: |
          url="${{ steps.deploy.outputs.url }}"
          code=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 15 "${url}/api/health" || echo "000")
          echo "Health check: HTTP $code"
          if [ "$code" != "200" ]; then
            echo "::warning::Proxy health check failed ($code) — site will use baked seed until fixed"
          fi