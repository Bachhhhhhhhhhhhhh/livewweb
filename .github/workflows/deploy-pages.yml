name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build static site
        run: npm run build:pages
        env:
          GITHUB_PAGES: '1'
          VITE_STATIC_MIRROR: '1'
          VITE_UNLOCK_ALL: '1'
          VITE_WS_API_URL: ${{ vars.LIVEWWEB_API_URL || 'https://livewweb.vercel.app' }}
          PROXY_TO_UPSTREAM_API: '1'

      - name: Prepare GitHub Pages entrypoints
        run: |
          touch dist/.nojekyll
          cp dist/dashboard.html dist/404.html
          printf '%s\n' \
            '<!DOCTYPE html>' \
            '<html lang="en">' \
            '<head>' \
            '  <meta charset="UTF-8" />' \
            '  <meta http-equiv="refresh" content="0;url=./dashboard.html" />' \
            '  <script>location.replace("./dashboard.html");</script>' \
            '  <title>World Monitor</title>' \
            '</head>' \
            '<body></body>' \
            '</html>' \
            > dist/index.html

      - name: Verify build artifacts
        run: |
          test -f dist/dashboard.html
          test -f dist/live-seed/bootstrap-fast.json
          test -f dist/live-seed/bootstrap-slow.json
          echo "dist size: $(du -sh dist | cut -f1)"
          ls -la dist/live-seed/
          node <<'NODE'
          import { readFileSync, existsSync } from 'node:fs';
          import { join } from 'node:path';

          const pages = ['dashboard.html', 'index.html', '404.html'];
          const assetRe = /(?:src|href)="(\/?assets\/[^"]+)"/g;
          const missing = [];

          for (const page of pages) {
            const file = join('dist', page);
            if (!existsSync(file)) continue;
            const html = readFileSync(file, 'utf8');
            for (const match of html.matchAll(assetRe)) {
              const rel = match[1].replace(/^\//, '');
              if (!existsSync(join('dist', rel))) missing.push(`${page} -> ${rel}`);
            }
          }

          if (missing.length) {
            console.error('Missing referenced assets:\n' + missing.join('\n'));
            process.exit(1);
          }
          console.log('Asset integrity check passed');
          NODE

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - uses: actions/deploy-pages@v4
        id: deployment