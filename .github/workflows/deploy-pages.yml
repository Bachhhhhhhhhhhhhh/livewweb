name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.pages-url.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build static site
        run: npm run build:pages
        env:
          GITHUB_PAGES: '1'
          VITE_STATIC_MIRROR: '1'
          VITE_UNLOCK_ALL: '1'
          VITE_WS_API_URL: 'https://api.worldmonitor.app'
          PROXY_TO_UPSTREAM_API: '1'

      - name: Prepare GitHub Pages entrypoints
        run: |
          touch dist/.nojekyll
          cp dist/dashboard.html dist/404.html
          printf '%s\n' \
            '<!DOCTYPE html>' \
            '<html lang="en">' \
            '<head>' \
            '  <meta charset="UTF-8" />' \
            '  <meta http-equiv="refresh" content="0;url=./dashboard.html" />' \
            '  <script>location.replace("./dashboard.html");</script>' \
            '  <title>World Monitor</title>' \
            '</head>' \
            '<body></body>' \
            '</html>' \
            > dist/index.html

      - name: Verify build artifacts
        run: |
          test -f dist/dashboard.html
          test -f dist/live-seed/bootstrap-fast.json
          test -f dist/live-seed/bootstrap-slow.json
          echo "dist size: $(du -sh dist | cut -f1)"
          ls -la dist/live-seed/

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
          enable_jekyll: false

      - name: Point GitHub Pages at gh-pages branch
        run: |
          code=$(curl -s -o /tmp/pages.json -w "%{http_code}" \
            -X PUT \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages" \
            -d '{"build_type":"legacy","source":{"branch":"gh-pages","path":"/"}}')
          echo "Pages configure HTTP $code"
          cat /tmp/pages.json

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - uses: actions/deploy-pages@v4
        id: deployment
        continue-on-error: true

      - name: Resolve public URL
        id: pages-url
        run: |
          if [ -n "${{ steps.deployment.outputs.page_url }}" ]; then
            echo "url=${{ steps.deployment.outputs.page_url }}" >> "$GITHUB_OUTPUT"
          else
            echo "url=https://bachhhhhhhhhhhhhh.github.io/livewweb/" >> "$GITHUB_OUTPUT"
          fi