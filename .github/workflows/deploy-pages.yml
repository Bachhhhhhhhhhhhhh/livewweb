name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy-vercel:
    runs-on: ubuntu-latest
    continue-on-error: true
    outputs:
      url: ${{ steps.vercel.outputs.preview-url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Deploy API + web to Vercel
        id: vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./

  build:
    needs: deploy-vercel
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build static site
        run: npm run build:pages
        env:
          GITHUB_PAGES: '1'
          VITE_STATIC_MIRROR: '1'
          VITE_UNLOCK_ALL: '1'
          VITE_WS_API_URL: ${{ needs.deploy-vercel.outputs.url != '' && format('{0}', needs.deploy-vercel.outputs.url) || 'https://livewweb.vercel.app' }}
          PROXY_TO_UPSTREAM_API: '1'

      - name: Prepare GitHub Pages entrypoints
        run: |
          touch dist/.nojekyll
          cp dist/dashboard.html dist/404.html
          printf '%s\n' \
            '<!DOCTYPE html>' \
            '<html lang="en">' \
            '<head>' \
            '  <meta charset="UTF-8" />' \
            '  <meta http-equiv="refresh" content="0;url=./dashboard.html" />' \
            '  <script>location.replace("./dashboard.html");</script>' \
            '  <title>World Monitor</title>' \
            '</head>' \
            '<body></body>' \
            '</html>' \
            > dist/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment