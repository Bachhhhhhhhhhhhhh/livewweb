name: Refresh Live Seed

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-live-seed
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install and fetch live seed
        run: |
          npm ci --ignore-scripts
          node scripts/fetch-live-seed.mjs

      - name: Update site/live-seed on main
        run: |
          mkdir -p site
          rm -rf site/live-seed
          cp -r public/live-seed site/live-seed
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/live-seed
          git diff --staged --quiet && echo "live-seed unchanged" && exit 0
          git commit -m "chore: refresh live-seed $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]"
          git push