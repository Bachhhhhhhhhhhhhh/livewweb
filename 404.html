<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Vision of World</title>
  <meta name="application-name" content="The Vision of World" />
  <meta name="theme-color" content="#0a0f0a" />
  <meta name="color-scheme" content="dark" />
  <link rel="icon" type="image/x-icon" href="/livewweb/favico/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/livewweb/favico/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/livewweb/favico/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/livewweb/favico/apple-touch-icon.png" />
  <link rel="manifest" href="/livewweb/site.webmanifest" />
  <meta http-equiv="refresh" content="0;url=/livewweb/docs/dashboard.html" />
  <style>
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
      background:radial-gradient(ellipse 80% 60% at 50% 0%,#0f2a22 0%,#0a0f0a 55%);
      color:#e5e7eb;font-family:system-ui,-apple-system,Segoe UI,sans-serif}
    .card{text-align:center;padding:2.5rem 2rem;max-width:22rem}
    .badge{display:inline-block;font-size:.65rem;letter-spacing:.28em;font-weight:700;
      color:#34d399;border:1px solid rgba(52,211,153,.35);border-radius:999px;
      padding:.35rem .85rem;margin-bottom:1rem}
    h1{font-size:1.35rem;font-weight:600;letter-spacing:.04em;margin:0 0 .5rem;line-height:1.3}
    .sub{color:#9ca3af;font-size:.875rem;margin:0 0 1.25rem;line-height:1.5}
    .pulse{width:10px;height:10px;border-radius:50%;background:#34d399;
      margin:0 auto 1.25rem;box-shadow:0 0 12px rgba(52,211,153,.6);
      animation:vip-pulse 1.4s ease-in-out infinite}
    @keyframes vip-pulse{0%,100%{opacity:.35;transform:scale(.9)}50%{opacity:1;transform:scale(1.15)}}
    a{color:#34d399;text-decoration:none;font-size:.875rem;font-weight:500}
    a:hover{text-decoration:underline}
  </style>
  <script>location.replace("/livewweb/docs/dashboard.html" + location.search + location.hash);</script>
</head>
<body>
  <div class="card">
    <div class="badge">GLOBAL INTELLIGENCE</div>
    <h1>THE VISION OF WORLD</h1>
    <p class="sub">Opening real-time intelligence dashboard…</p>
    <div class="pulse" aria-hidden="true"></div>
    <a href="/livewweb/docs/dashboard.html">Enter dashboard</a>
  </div>
</body>
</html>
