<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Monitor</title>
  <script>
    (function () {
      var m = location.pathname.match(/^(\/[^/]+)/);
      var base = m ? m[1] : '';
      var dest = base + '/docs/dashboard.html' + location.search + location.hash;
      var meta = document.createElement('meta');
      meta.httpEquiv = 'refresh';
      meta.content = '0;url=' + dest;
      document.head.appendChild(meta);
      location.replace(dest);
    })();
  </script>
</head>
<body>
  <p>Redirecting to <a id="link">dashboard</a>…</p>
  <script>
    var m = location.pathname.match(/^(\/[^/]+)/);
    var dest = (m ? m[1] : '') + '/docs/dashboard.html' + location.search + location.hash;
    document.getElementById('link').href = dest;
  </script>
</body>
</html>
