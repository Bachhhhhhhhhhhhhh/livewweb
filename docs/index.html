<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Vision of World</title>
  <meta name="application-name" content="The Vision of World" />
  <meta name="theme-color" content="#030304" />
  <meta name="color-scheme" content="dark" />
  <link rel="icon" type="image/x-icon" href="./favico/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="./favico/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="./favico/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="./favico/apple-touch-icon.png" />
  <link rel="manifest" href="./site.webmanifest" />
  <meta http-equiv="refresh" content="0;url=./dashboard.html" />
  <style>
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
      background:radial-gradient(ellipse 100% 70% at 50% -10%,rgba(120,0,30,.45) 0%,#030304 60%);
      color:#f0e0e4;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;position:relative}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;opacity:.05;
      background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.6) 2px,rgba(0,0,0,.6) 4px)}
    .card{text-align:center;padding:2.5rem 2rem;max-width:24rem;position:relative;z-index:1}
    .badge{display:inline-block;font-size:.6rem;letter-spacing:.32em;font-weight:800;
      color:#ff2a3a;border:1px solid rgba(255, 42, 58, 0.55);border-radius:2px;
      padding:.4rem .9rem;margin-bottom:1rem;text-transform:uppercase;
      box-shadow:0 0 16px rgba(255, 42, 58, 0.55)}
    h1{font-size:1.4rem;font-weight:700;letter-spacing:.12em;margin:0 0 .5rem;line-height:1.3;
      color:#ff3b4a;text-shadow:0 0 20px rgba(255, 42, 58, 0.55)}
    .sub{color:#a08088;font-size:.8rem;margin:0 0 1.25rem;line-height:1.5;letter-spacing:.04em}
    .pulse{width:12px;height:12px;border-radius:50%;background:#ff2a3a;
      margin:0 auto 1.25rem;box-shadow:0 0 16px rgba(255, 42, 58, 0.55),0 0 32px rgba(255,0,40,.3);
      animation:vip-pulse 1s ease-in-out infinite}
    @keyframes vip-pulse{0%,100%{opacity:.4;transform:scale(.85)}50%{opacity:1;transform:scale(1.2)}}
    a{color:#ff2a3a;text-decoration:none;font-size:.8rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase}
    a:hover{text-shadow:0 0 8px rgba(255, 42, 58, 0.55)}
  </style>
  <script>location.replace("./dashboard.html" + location.search + location.hash);</script>
</head>
<body>
  <div class="card">
    <div class="badge">⚠ THREAT MATRIX ACTIVE</div>
    <h1>THE VISION OF WORLD</h1>
    <p class="sub">Initializing global crisis intelligence…</p>
    <div class="pulse" aria-hidden="true"></div>
    <a href="./dashboard.html">Enter dashboard</a>
  </div>
</body>
</html>
