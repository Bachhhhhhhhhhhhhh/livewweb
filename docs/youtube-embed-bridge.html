<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>YouTube Embed Bridge</title>
  <style>
    html,body{margin:0;padding:0;width:100%;height:100%;background:#000;overflow:hidden}
    #player{width:100%;height:100%}
    #play-overlay{position:absolute;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;cursor:pointer;background:rgba(0,0,0,0.35)}
    #play-overlay svg{width:72px;height:72px;opacity:0.9;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.5))}
    #play-overlay.hidden{display:none}
  </style>
</head>
<body>
  <div id="player"></div>
  <div id="play-overlay" class="hidden">
    <svg viewBox="0 0 68 48"><path d="M66.52 7.74c-.78-2.93-2.49-5.41-5.42-6.19C55.79.13 34 0 34 0S12.21.13 6.9 1.55C3.97 2.33 2.27 4.81 1.48 7.74.06 13.05 0 24 0 24s.06 10.95 1.48 16.26c.78 2.93 2.49 5.41 5.42 6.19C12.21 47.87 34 48 34 48s21.79-.13 27.1-1.55c2.93-.78 4.64-3.26 5.42-6.19C67.94 34.95 68 24 68 24s-.06-10.95-1.48-16.26z" fill="red"/><path d="M45 24L27 14v20" fill="#fff"/></svg>
  </div>
  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var videoId = (params.get('videoId') || '').match(/^[A-Za-z0-9_-]{11}$/) ? params.get('videoId') : null;
      if (!videoId) {
        document.body.textContent = 'Invalid videoId';
        return;
      }
      var autoplay = params.get('autoplay') === '0' ? 0 : 1;
      var mute = params.get('mute') === '0' ? 0 : 1;
      var vq = params.get('vq') || '';
      var origin = params.get('origin') || 'https://worldmonitor.app';
      var parentOrigin = params.get('parentOrigin') || '*';
      if (!/^https:\/\/worldmonitor\.app$/.test(origin)) origin = 'https://worldmonitor.app';

      function tryStorageAccess() {
        if (document.requestStorageAccess) document.requestStorageAccess().catch(function () {});
      }
      tryStorageAccess();

      var tag = document.createElement('script');
      tag.src = 'https://www.youtube.com/iframe_api';
      document.head.appendChild(tag);

      var player, overlay = document.getElementById('play-overlay'), started = false, muteSyncId;
      function hideOverlay() { overlay.classList.add('hidden'); }
      function readMuted() {
        if (!player) return null;
        if (typeof player.isMuted === 'function') return player.isMuted();
        if (typeof player.getVolume === 'function') return player.getVolume() === 0;
        return null;
      }
      function stopMuteSync() { if (muteSyncId) { clearInterval(muteSyncId); muteSyncId = null; } }
      function startMuteSync() {
        if (muteSyncId) return;
        var last = readMuted();
        if (last !== null) window.parent.postMessage({ type: 'yt-mute-state', muted: last }, parentOrigin);
        muteSyncId = setInterval(function () {
          var m = readMuted();
          if (m !== null && m !== last) {
            last = m;
            window.parent.postMessage({ type: 'yt-mute-state', muted: m }, parentOrigin);
          }
        }, 500);
      }
      // Must be global — YouTube iframe_api calls window.onYouTubeIframeAPIReady.
      window.onYouTubeIframeAPIReady = function () {
        player = new YT.Player('player', {
          videoId: videoId,
          host: 'https://www.youtube.com',
          playerVars: {
            autoplay: autoplay,
            mute: mute,
            playsinline: 1,
            rel: 0,
            controls: 1,
            modestbranding: 1,
            enablejsapi: 1,
            origin: origin,
            widget_referrer: origin,
          },
          events: {
            onReady: function () {
              window.parent.postMessage({ type: 'yt-ready' }, parentOrigin);
              if (vq && player.setPlaybackQuality) player.setPlaybackQuality(vq);
              if (autoplay === 1 && player.playVideo) player.playVideo();
              startMuteSync();
            },
            onError: function (e) {
              stopMuteSync();
              window.parent.postMessage({ type: 'yt-error', code: e.data }, parentOrigin);
            },
            onStateChange: function (e) {
              window.parent.postMessage({ type: 'yt-state', state: e.data }, parentOrigin);
              if (e.data === 1 || e.data === 3) { hideOverlay(); started = true; }
            },
          },
        });
      };
      overlay.addEventListener('click', function () {
        tryStorageAccess();
        if (player && player.playVideo) { player.playVideo(); player.unMute(); hideOverlay(); }
      });
      setTimeout(function () { if (!started) overlay.classList.remove('hidden'); }, 3000);
      window.addEventListener('message', function (e) {
        if (parentOrigin !== '*' && e.origin !== parentOrigin) return;
        if (!player || !player.getPlayerState) return;
        var m = e.data;
        if (!m || !m.type) return;
        switch (m.type) {
          case 'play': player.playVideo(); break;
          case 'pause': player.pauseVideo(); break;
          case 'mute': player.mute(); break;
          case 'unmute': player.unMute(); break;
          case 'loadVideo': if (m.videoId) player.loadVideoById(m.videoId); break;
          case 'setQuality': if (m.quality && player.setPlaybackQuality) player.setPlaybackQuality(m.quality); break;
        }
      });
    })();
  </script>
</body>
</html>
