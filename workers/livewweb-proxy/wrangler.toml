name = "livewweb-proxy"
main = "src/index.js"
compatibility_date = "2025-05-01"

# Production URL: https://livewweb-proxy.<account-subdomain>.workers.dev
# Baked into GitHub Pages via VITE_WS_API_URL (package.json build:pages).
# Deploy: add CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID to GitHub repo secrets
#         → workflow deploy-livewweb-proxy.yml runs on push.

[vars]
UNLOCK_ALL = "1"

# AI chat: wrangler secret put GROQ_API_KEY
# Optional: wrangler secret put GROQ_MODEL (default llama-3.1-8b-instant)
# Premium RPC unlock: wrangler secret put WORLDMONITOR_API_KEY

[observability]
enabled = true